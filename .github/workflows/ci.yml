name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate plugin structure
        run: bash .ci/validate-structure.sh

      - name: Validate marketplace consistency
        run: bash .ci/validate-marketplace-sync.sh

      - name: Validate JSON
        run: bash .ci/validate-json.sh

      - name: Validate Markdown internal links
        run: bash .ci/validate-markdown-internal-links.sh

      - name: Validate shell script syntax
        run: bash .ci/validate-shell-syntax.sh
