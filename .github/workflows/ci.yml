name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast:
    name: Fast checks
    runs-on: ubuntu-latest
    env:
      CI: "true"
    steps:
      - uses: actions/checkout@v4
      - name: Install tooling
        run: scripts/bootstrap.sh --ci
      - name: Format check
        run: scripts/fmt.sh --check
      - name: Lint
        run: scripts/lint.sh
      - name: Validate (fast)
        run: scripts/validate.sh --fast

  slow:
    name: Slow checks
    runs-on: ubuntu-latest
    env:
      CI: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install tooling
        run: scripts/bootstrap.sh --ci
      - name: Validate (slow)
        run: scripts/validate.sh --slow
      - name: Install smoke test
        run: scripts/install-test.sh
      - name: Secret scan
        run: scripts/security.sh
